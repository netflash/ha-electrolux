name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest.json
        id: get_version
        run: |
          # Robust extraction of the version value
          VERSION=$(jq -r '.version' custom_components/electrolux/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version found: $VERSION"

      - name: Read release notes
        id: release_notes
        run: |
          RELEASE_FILE="release_notes/RELEASE_NOTES_v${{ steps.get_version.outputs.version }}.md"
          if [ -f "$RELEASE_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "title=Version ${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No release notes file found: $RELEASE_FILE"
          fi

      - name: Create electrolux.zip asset
        if: github.event_name == 'push'
        run: |
          mkdir -p dist
          # -j (junk paths) is often preferred for HA components so the zip 
          # starts at the internal folder structure, but -r is fine for full custom_components
          zip -r dist/electrolux.zip custom_components

      - name: Create or Update Release
        if: steps.release_notes.outputs.found == 'true' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
          TITLE: ${{ steps.release_notes.outputs.title }}
          NOTES_PATH: "release_notes/RELEASE_NOTES_v${{ steps.get_version.outputs.version }}.md"
        run: |
          TAG="v${VERSION}"
          
          # Check for published release
          if gh release view "$TAG" --json isDraft | grep -q '"isDraft":false'; then
            echo "Published release $TAG already exists. Skipping."
            exit 0
          fi

          # Check if draft exists
          if gh release view "$TAG" --json isDraft | grep -q '"isDraft":true'; then
            echo "Updating existing draft release $TAG"
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_PATH"
            
            # Re-upload asset (delete if exists to avoid conflicts)
            gh release upload "$TAG" dist/electrolux.zip --clobber
          else
            echo "Creating new draft release $TAG"
            gh release create "$TAG" \
              dist/electrolux.zip \
              --draft \
              --title "$TITLE" \
              --notes-file "$NOTES_PATH"
          fi